<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圍棋對弈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h1 {
  margin: 16px 0 8px;
  font-size: 28px;
  color: #f0d060;
  text-shadow: 0 2px 8px rgba(240,208,96,0.3);
}

/* Layout */
.game-container {
  display: flex;
  gap: 20px;
  padding: 10px 20px;
  width: 100%;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: nowrap;
}
.panel {
  background: #16213e;
  border-radius: 12px;
  padding: 16px;
  width: 240px;
  min-width: 200px;
  flex-shrink: 0;
}
.panel h3 {
  color: #f0d060;
  margin-bottom: 12px;
  font-size: 16px;
  border-bottom: 1px solid #2a3a5e;
  padding-bottom: 8px;
}
.board-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
}
canvas {
  cursor: pointer;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* Controls */
.control-group { margin-bottom: 14px; }
.control-group label {
  display: block;
  font-size: 13px;
  color: #8899bb;
  margin-bottom: 4px;
}
select, button {
  font-family: inherit;
  font-size: 14px;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  width: 100%;
  cursor: pointer;
}
select {
  background: #2a3a5e;
  color: #e0e0e0;
  outline: none;
}
button {
  background: #2a3a5e;
  color: #e0e0e0;
  transition: background 0.2s;
  margin-bottom: 6px;
}
button:hover { background: #3a4a7e; }
button.primary {
  background: #c0943a;
  color: #1a1a2e;
  font-weight: bold;
}
button.primary:hover { background: #d4a84a; }
button.danger { background: #8b3a3a; color: #e0e0e0; }
button.danger:hover { background: #a04a4a; }

/* Toggle switch */
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.toggle-row span { font-size: 13px; color: #8899bb; }
.toggle {
  position: relative;
  width: 44px;
  height: 24px;
}
.toggle input { display: none; }
.toggle .slider {
  position: absolute;
  inset: 0;
  background: #2a3a5e;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle .slider::before {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  left: 3px; top: 3px;
  background: #8899bb;
  border-radius: 50%;
  transition: transform 0.3s, background 0.3s;
}
.toggle input:checked + .slider { background: #c0943a; }
.toggle input:checked + .slider::before {
  transform: translateX(20px);
  background: #fff;
}

/* Info display */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 14px;
}
.info-row .label { color: #8899bb; }
.info-row .value { font-weight: bold; }
.black-indicator { color: #ccc; }
.white-indicator { color: #fff; }
.current-turn {
  text-align: center;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
}
.current-turn.black { background: #333; color: #fff; }
.current-turn.white { background: #e8e0d0; color: #333; }

/* Timer */
.timer-display {
  text-align: center;
  font-size: 24px;
  font-family: 'Courier New', monospace;
  padding: 8px;
  background: #0f1a30;
  border-radius: 6px;
  margin: 4px 0;
}
.timer-display.urgent { color: #ff6b6b; }

/* Review controls */
.review-controls {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.review-controls button {
  flex: 1;
  padding: 8px 4px;
  font-size: 18px;
}
.move-info {
  text-align: center;
  font-size: 13px;
  color: #8899bb;
  margin-top: 6px;
}

/* Scoring overlay */
.scoring-panel {
  background: #1e2d50;
  border: 2px solid #c0943a;
  border-radius: 8px;
  padding: 12px;
  margin-top: 10px;
}
.scoring-panel h4 {
  color: #f0d060;
  margin-bottom: 8px;
  text-align: center;
}
.score-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 14px;
}

/* Status message */
.status-msg {
  text-align: center;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  font-size: 14px;
  background: #1e2d50;
  min-height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #16213e;
  border: 2px solid #c0943a;
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  max-width: 360px;
  width: 90%;
}
.modal h2 { color: #f0d060; margin-bottom: 16px; }
.modal p { margin-bottom: 8px; font-size: 16px; }
.modal button { margin-top: 16px; }

/* Responsive */
@media (max-width: 900px) {
  .game-container { flex-wrap: wrap; }
  .panel { width: 100%; max-width: 400px; min-width: unset; flex-shrink: 1; }
}
</style>
</head>
<body>
<script src="gnugo-loader.js"></script>

<h1>⚫ 圍棋對弈 ⚪</h1>

<div class="game-container">
  <!-- Left Panel: Settings -->
  <div class="panel" id="settingsPanel">
    <h3>⚙️ 遊戲設定</h3>
    <div class="control-group">
      <label>棋盤大小</label>
      <select id="boardSize">
        <option value="9">9 × 9</option>
        <option value="13">13 × 13</option>
        <option value="19" selected>19 × 19</option>
      </select>
    </div>
    <div class="control-group">
      <label>對弈模式</label>
      <select id="gameMode">
        <option value="pvp">人 vs 人</option>
        <option value="pvc" selected>人 vs 電腦</option>
      </select>
    </div>
    <div class="control-group" id="playerColorGroup">
      <label>玩家執子</label>
      <select id="playerColor">
        <option value="1">執黑（先手）</option>
        <option value="2">執白（後手）</option>
      </select>
    </div>
    <div class="control-group" id="aiStrengthGroup">
      <label>AI 強度（GnuGo 等級）</label>
      <select id="aiStrength">
        <option value="1">初級（Level 1）</option>
        <option value="5">中級（Level 5）</option>
        <option value="10" selected>高級（Level 10）</option>
      </select>
    </div>

    <h3 style="margin-top:16px">🔧 功能開關</h3>
    <div class="toggle-row">
      <span>計時器</span>
      <label class="toggle"><input type="checkbox" id="timerToggle"><span class="slider"></span></label>
    </div>
    <div id="timerSettings" style="display:none; margin-bottom:8px;">
      <label style="font-size:12px;color:#8899bb">每方時間（分鐘）</label>
      <select id="timerMinutes" style="margin-top:2px">
        <option value="5">5 分鐘</option>
        <option value="10" selected>10 分鐘</option>
        <option value="20">20 分鐘</option>
        <option value="30">30 分鐘</option>
        <option value="60">60 分鐘</option>
      </select>
    </div>
    <div class="toggle-row">
      <span>悔棋</span>
      <label class="toggle"><input type="checkbox" id="undoToggle" checked><span class="slider"></span></label>
    </div>
    <div class="toggle-row">
      <span>覆盤</span>
      <label class="toggle"><input type="checkbox" id="reviewToggle" checked><span class="slider"></span></label>
    </div>

    <button class="primary" onclick="startNewGame()" style="margin-top:12px">🎮 開始新遊戲</button>
  </div>

  <!-- Center: Board -->
  <div class="board-wrapper">
    <canvas id="board"></canvas>
    <div id="reviewBar" style="display:none; width:100%; max-width:500px; margin-top:6px;">
      <div class="review-controls">
        <button onclick="reviewGo(0)" title="回到開始">⏮</button>
        <button onclick="reviewGo(currentReviewMove-1)" title="上一手">◀</button>
        <button onclick="reviewGo(currentReviewMove+1)" title="下一手">▶</button>
        <button onclick="reviewGo(moveHistory.length)" title="到最新">⏭</button>
      </div>
      <div class="move-info" id="reviewInfo"></div>
    </div>
  </div>

  <!-- Right Panel: Game Info -->
  <div class="panel" id="infoPanel">
    <h3>📊 對局資訊</h3>
    <div class="current-turn black" id="turnDisplay">⚫ 黑方回合</div>

    <div id="timerArea" style="display:none;">
      <div class="info-row"><span class="label">⚫ 黑方時間</span></div>
      <div class="timer-display" id="blackTimer">10:00</div>
      <div class="info-row"><span class="label">⚪ 白方時間</span></div>
      <div class="timer-display" id="whiteTimer">10:00</div>
    </div>

    <div class="info-row">
      <span class="label">⚫ 黑方提子</span>
      <span class="value black-indicator" id="blackCaptures">0</span>
    </div>
    <div class="info-row">
      <span class="label">⚪ 白方提子</span>
      <span class="value white-indicator" id="whiteCaptures">0</span>
    </div>
    <div class="info-row">
      <span class="label">手數</span>
      <span class="value" id="moveCount">0</span>
    </div>

    <div class="status-msg" id="statusMsg">請開始新遊戲</div>

    <div style="margin-top:12px">
      <button onclick="doPass()">🤚 Pass（虛手）</button>
      <button onclick="doUndo()" id="undoBtn">↩️ 悔棋</button>
      <button onclick="doResign()" class="danger">🏳️ 認輸</button>
      <button onclick="enterReview()" id="reviewBtn" style="display:none">📖 覆盤</button>
      <button onclick="exitReview()" id="exitReviewBtn" style="display:none">❌ 結束覆盤</button>
    </div>

    <!-- Scoring Panel -->
    <div class="scoring-panel" id="scoringPanel" style="display:none">
      <h4>📐 數目結果</h4>
      <div class="score-row"><span>⚫ 黑方</span><span id="blackScore">0</span></div>
      <div class="score-row" style="font-size:12px;color:#8899bb"><span>　棋子+目</span><span id="blackDetail"></span></div>
      <div class="score-row"><span>⚪ 白方</span><span id="whiteScore">0</span></div>
      <div class="score-row" style="font-size:12px;color:#8899bb"><span>　棋子+目（含貼目）</span><span id="whiteDetail"></span></div>
      <div class="score-row" style="border-top:1px solid #3a4a6e;padding-top:8px;margin-top:4px">
        <span style="font-weight:bold">結果</span>
        <span style="font-weight:bold;color:#f0d060" id="resultText"></span>
      </div>
      <p style="font-size:11px;color:#667;margin-top:8px">點擊棋盤上的死子將其標記</p>
      <button onclick="confirmScoring()" class="primary" style="margin-top:6px">✅ 確認結果</button>
      <button onclick="cancelScoring()">取消數目</button>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <h2 id="modalTitle">遊戲結束</h2>
    <p id="modalResult"></p>
    <p id="modalDetail" style="font-size:13px;color:#8899bb"></p>
    <button class="primary" onclick="closeModal()">確定</button>
  </div>
</div>

<script>
// ==================== CONSTANTS ====================
const EMPTY = 0, BLACK = 1, WHITE = 2;
const KOMI = 7.5;

const STAR_POINTS = {
  9:  [[2,2],[2,6],[4,4],[6,2],[6,6]],
  13: [[3,3],[3,6],[3,9],[6,3],[6,6],[6,9],[9,3],[9,6],[9,9]],
  19: [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]]
};

// ==================== GAME STATE ====================
let size = 19;
let board = [];
let currentPlayer = BLACK;
let captures = { [BLACK]: 0, [WHITE]: 0 };
let moveHistory = [];
let boardHistory = [];
let koPoint = null;
let passCount = 0;
let gameOver = false;
let gameMode = 'pvc';
let playerColor = BLACK;
let aiLevel = 10;
let isAIThinking = false;
let gnugoModule = null;
let gnugoReady = false;

// Timer
let timerEnabled = false;
let timerSeconds = { [BLACK]: 600, [WHITE]: 600 };
let timerInterval = null;

// Review
let isReviewing = false;
let currentReviewMove = 0;

// Scoring
let isScoring = false;
let deadStones = new Set();

// Canvas
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let cellSize = 30;
let padding = 25;
let lastMove = null;
let hoverPos = null;

// ==================== BOARD / RULES ENGINE ====================
function createBoard(n) {
  return Array.from({ length: n }, () => Array(n).fill(EMPTY));
}

function cloneBoard(b) {
  return b.map(r => [...r]);
}

function opponent(player) {
  return player === BLACK ? WHITE : BLACK;
}

function inBounds(x, y) {
  return x >= 0 && x < size && y >= 0 && y < size;
}

function getNeighbors(x, y) {
  return [[x-1,y],[x+1,y],[x,y-1],[x,y+1]].filter(([a,b]) => inBounds(a,b));
}

function getGroup(b, x, y) {
  const color = b[x][y];
  if (color === EMPTY) return { stones: [], liberties: new Set() };
  const visited = new Set();
  const stones = [];
  const liberties = new Set();
  const stack = [[x, y]];
  while (stack.length) {
    const [cx, cy] = stack.pop();
    const key = cx * size + cy;
    if (visited.has(key)) continue;
    visited.add(key);
    if (b[cx][cy] === color) {
      stones.push([cx, cy]);
      for (const [nx, ny] of getNeighbors(cx, cy)) {
        if (b[nx][ny] === EMPTY) liberties.add(nx * size + ny);
        else if (b[nx][ny] === color && !visited.has(nx * size + ny)) stack.push([nx, ny]);
      }
    }
  }
  return { stones, liberties };
}

function removeGroup(b, stones) {
  for (const [x, y] of stones) b[x][y] = EMPTY;
  return stones.length;
}

function boardToString(b) {
  return b.map(r => r.join('')).join('');
}

// Returns { valid, newBoard, captured } or { valid: false }
function tryPlaceStone(b, x, y, player, currentKo) {
  if (b[x][y] !== EMPTY) return { valid: false };

  const newBoard = cloneBoard(b);
  newBoard[x][y] = player;
  let captured = 0;
  let capturedSingle = null;
  const opp = opponent(player);

  // Remove opponent groups with no liberties
  for (const [nx, ny] of getNeighbors(x, y)) {
    if (newBoard[nx][ny] === opp) {
      const group = getGroup(newBoard, nx, ny);
      if (group.liberties.size === 0) {
        if (group.stones.length === 1) capturedSingle = group.stones[0];
        captured += removeGroup(newBoard, group.stones);
      }
    }
  }

  // Check suicide
  const selfGroup = getGroup(newBoard, x, y);
  if (selfGroup.liberties.size === 0) return { valid: false };

  // Check ko
  if (currentKo && currentKo[0] === x && currentKo[1] === y) return { valid: false };

  // Determine new ko point
  let newKo = null;
  if (captured === 1 && capturedSingle && selfGroup.stones.length === 1 && selfGroup.liberties.size === 1) {
    newKo = capturedSingle;
  }

  return { valid: true, newBoard, captured, newKo };
}

function getLegalMoves(b, player, ko) {
  const moves = [];
  for (let x = 0; x < size; x++)
    for (let y = 0; y < size; y++)
      if (tryPlaceStone(b, x, y, player, ko).valid) moves.push([x, y]);
  return moves;
}

// ==================== SCORING ====================
function calculateScore(b, dead) {
  const scored = cloneBoard(b);
  // Remove dead stones
  for (const key of dead) {
    const x = Math.floor(key / size), y = key % size;
    const color = scored[x][y];
    if (color !== EMPTY) {
      captures[opponent(color)] += 1; // dead stones count as captures
      scored[x][y] = EMPTY;
    }
  }

  // Flood fill to find territory
  const territory = Array.from({ length: size }, () => Array(size).fill(0));
  const visited = Array.from({ length: size }, () => Array(size).fill(false));

  for (let x = 0; x < size; x++) {
    for (let y = 0; y < size; y++) {
      if (visited[x][y] || scored[x][y] !== EMPTY) continue;
      const region = [];
      const borders = new Set();
      const stack = [[x, y]];
      while (stack.length) {
        const [cx, cy] = stack.pop();
        if (visited[cx][cy]) continue;
        visited[cx][cy] = true;
        if (scored[cx][cy] === EMPTY) {
          region.push([cx, cy]);
          for (const [nx, ny] of getNeighbors(cx, cy)) {
            if (scored[nx][ny] !== EMPTY) borders.add(scored[nx][ny]);
            else if (!visited[nx][ny]) stack.push([nx, ny]);
          }
        }
      }
      if (borders.size === 1) {
        const owner = [...borders][0];
        for (const [rx, ry] of region) territory[rx][ry] = owner;
      }
    }
  }

  // Count: stones on board + territory (Chinese rules)
  let blackStones = 0, whiteStones = 0, blackTerritory = 0, whiteTerritory = 0;
  for (let x = 0; x < size; x++) {
    for (let y = 0; y < size; y++) {
      if (scored[x][y] === BLACK) blackStones++;
      else if (scored[x][y] === WHITE) whiteStones++;
      if (territory[x][y] === BLACK) blackTerritory++;
      else if (territory[x][y] === WHITE) whiteTerritory++;
    }
  }

  return {
    black: blackStones + blackTerritory,
    white: whiteStones + whiteTerritory + KOMI,
    blackStones, blackTerritory, whiteStones, whiteTerritory,
    territory
  };
}

// ==================== RENDERING ====================
function resizeCanvas() {
  const panelWidth = 260;
  const maxW = window.innerWidth - panelWidth * 2 - 80;
  const maxH = window.innerHeight - 120;
  const maxSize = Math.max(400, Math.min(maxW, maxH, 800));
  cellSize = Math.floor((maxSize - padding * 2) / (size - 1));
  const canvasSize = cellSize * (size - 1) + padding * 2;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
}

function drawBoard() {
  resizeCanvas();
  const w = canvas.width;

  // Wood background
  ctx.fillStyle = '#dcb35c';
  ctx.fillRect(0, 0, w, w);
  // Wood grain texture
  ctx.save();
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < w; i += 8) {
    ctx.strokeStyle = i % 24 === 0 ? '#a08030' : '#c4a04c';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(w, i + (Math.sin(i * 0.05) * 3));
    ctx.stroke();
  }
  ctx.restore();

  // Grid lines
  ctx.strokeStyle = '#5a4420';
  ctx.lineWidth = 1;
  for (let i = 0; i < size; i++) {
    const pos = padding + i * cellSize;
    ctx.beginPath();
    ctx.moveTo(padding, pos);
    ctx.lineTo(padding + (size - 1) * cellSize, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, padding);
    ctx.lineTo(pos, padding + (size - 1) * cellSize);
    ctx.stroke();
  }

  // Star points
  const stars = STAR_POINTS[size] || [];
  for (const [x, y] of stars) {
    ctx.fillStyle = '#5a4420';
    ctx.beginPath();
    ctx.arc(padding + y * cellSize, padding + x * cellSize, cellSize * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }

  // Coordinate labels
  ctx.fillStyle = '#5a4420';
  ctx.font = `${Math.max(10, cellSize * 0.35)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const letters = 'ABCDEFGHJKLMNOPQRST';
  for (let i = 0; i < size; i++) {
    const pos = padding + i * cellSize;
    ctx.fillText(letters[i], pos, padding + (size - 1) * cellSize + cellSize * 0.7);
    ctx.fillText(size - i, padding - cellSize * 0.6, pos);
  }

  // Territory markers (during scoring)
  if (isScoring) {
    const scoreData = calculateScore(board, deadStones);
    for (let x = 0; x < size; x++) {
      for (let y = 0; y < size; y++) {
        if (board[x][y] === EMPTY && scoreData.territory[x][y] !== 0) {
          const cx = padding + y * cellSize;
          const cy = padding + x * cellSize;
          ctx.fillStyle = scoreData.territory[x][y] === BLACK ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.4)';
          ctx.fillRect(cx - cellSize * 0.2, cy - cellSize * 0.2, cellSize * 0.4, cellSize * 0.4);
        }
      }
    }
  }

  // Stones
  const displayBoard = isReviewing ? getReviewBoard() : board;
  for (let x = 0; x < size; x++) {
    for (let y = 0; y < size; y++) {
      if (displayBoard[x][y] !== EMPTY) {
        drawStone(x, y, displayBoard[x][y], deadStones.has(x * size + y));
      }
    }
  }

  // Last move marker
  const lm = isReviewing ? getReviewLastMove() : lastMove;
  if (lm) {
    const [lx, ly] = lm;
    if (displayBoard[lx][ly] !== EMPTY) {
      ctx.fillStyle = displayBoard[lx][ly] === BLACK ? '#fff' : '#000';
      ctx.beginPath();
      ctx.arc(padding + ly * cellSize, padding + lx * cellSize, cellSize * 0.15, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Hover preview
  if (hoverPos && !gameOver && !isReviewing && !isScoring && !isAIThinking) {
    const [hx, hy] = hoverPos;
    if (board[hx][hy] === EMPTY) {
      ctx.globalAlpha = 0.4;
      drawStone(hx, hy, currentPlayer, false);
      ctx.globalAlpha = 1.0;
    }
  }
}

function drawStone(x, y, color, isDead) {
  const cx = padding + y * cellSize;
  const cy = padding + x * cellSize;
  const r = cellSize * 0.44;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.arc(cx + 2, cy + 2, r, 0, Math.PI * 2);
  ctx.fill();

  // Stone
  const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
  if (color === BLACK) {
    grad.addColorStop(0, '#555');
    grad.addColorStop(1, '#111');
  } else {
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, '#ccc');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = color === BLACK ? '#000' : '#aaa';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Dead stone marker
  if (isDead) {
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2.5;
    const d = r * 0.5;
    ctx.beginPath();
    ctx.moveTo(cx - d, cy - d);
    ctx.lineTo(cx + d, cy + d);
    ctx.moveTo(cx + d, cy - d);
    ctx.lineTo(cx - d, cy + d);
    ctx.stroke();
  }
}

// ==================== GAME ACTIONS ====================
function placeStone(x, y) {
  if (gameOver || isReviewing || isScoring) return false;
  if (isAIThinking && gameMode === 'pvc') return false;

  const result = tryPlaceStone(board, x, y, currentPlayer, koPoint);
  if (!result.valid) return false;

  // Save state for undo
  boardHistory.push({
    board: cloneBoard(board),
    captures: { ...captures },
    koPoint,
    currentPlayer,
    lastMove,
    passCount
  });

  board = result.newBoard;
  captures[currentPlayer] += result.captured;
  koPoint = result.newKo || null;
  lastMove = [x, y];
  passCount = 0;
  moveHistory.push({ x, y, player: currentPlayer, captured: result.captured });

  currentPlayer = opponent(currentPlayer);
  updateUI();
  drawBoard();
  playSound('place');

  // Timer switch
  if (timerEnabled) switchTimer();

  // AI turn
  if (gameMode === 'pvc' && currentPlayer !== playerColor && !gameOver) {
    setTimeout(() => requestAIMove(), 100);
  }

  return true;
}

function doPass() {
  if (gameOver || isReviewing || isScoring || isAIThinking) return;

  boardHistory.push({
    board: cloneBoard(board),
    captures: { ...captures },
    koPoint,
    currentPlayer,
    lastMove,
    passCount
  });

  passCount++;
  moveHistory.push({ x: -1, y: -1, player: currentPlayer, pass: true });
  koPoint = null;
  lastMove = null;

  if (passCount >= 2) {
    endGameByScoring();
    return;
  }

  currentPlayer = opponent(currentPlayer);
  updateUI();
  setStatus(`${currentPlayer === BLACK ? '黑' : '白'}方 Pass`);
  drawBoard();

  if (timerEnabled) switchTimer();
  if (gameMode === 'pvc' && currentPlayer !== playerColor && !gameOver) {
    setTimeout(() => requestAIMove(), 100);
  }
}

function doUndo() {
  if (gameOver || isReviewing || isScoring) return;
  if (!document.getElementById('undoToggle').checked) {
    setStatus('悔棋功能已關閉');
    return;
  }
  if (boardHistory.length === 0) return;

  // In PvC mode, undo twice (undo AI + player move)
  const undoCount = (gameMode === 'pvc' && boardHistory.length >= 2) ? 2 : 1;
  for (let i = 0; i < undoCount && boardHistory.length > 0; i++) {
    const state = boardHistory.pop();
    board = state.board;
    captures = state.captures;
    koPoint = state.koPoint;
    currentPlayer = state.currentPlayer;
    lastMove = state.lastMove;
    passCount = state.passCount;
    moveHistory.pop();
  }
  updateUI();
  drawBoard();
  setStatus('已悔棋');
}

function doResign() {
  if (gameOver || isReviewing || isScoring) return;
  const winner = opponent(currentPlayer);
  endGame(`${winner === BLACK ? '⚫ 黑方' : '⚪ 白方'}勝`, `${currentPlayer === BLACK ? '黑' : '白'}方認輸`);
}

function endGameByScoring() {

    ? `⚫ 黑勝 ${diff.toFixed(1)} 目`

// ==================== AI (GnuGo WASM) ====================

// Convert move history to SGF string for GnuGo
function buildSGF() {
  const letters = 'abcdefghijklmnopqrs';
  let sgf = `(;GM[1]FF[4]SZ[${size}]KM[7.5]`;
  for (const m of moveHistory) {
    const color = m.player === BLACK ? 'B' : 'W';
    if (m.pass) {
      sgf += `;${color}[]`;
    } else {
      sgf += `;${color}[${letters[m.y]}${letters[m.x]}]`;
    }
  }
  sgf += ')';
  return sgf;
}

// Parse GnuGo's SGF response to extract the last move
function parseGnuGoMove(sgfResponse) {
  const letters = 'abcdefghijklmnopqrs';
  // Find all move nodes ;B[..] or ;W[..]
  const movePattern = /;([BW])\[([a-s]{0,2})\]/g;
  const allMoves = [];
  let match;
  while ((match = movePattern.exec(sgfResponse)) !== null) {
    allMoves.push({ color: match[1], coord: match[2] });
  }

  if (allMoves.length <= moveHistory.length) {
    return null; // GnuGo passed or no move found
  }

  const gnugoMove = allMoves[allMoves.length - 1];
  if (!gnugoMove.coord || gnugoMove.coord.length < 2) {
    return null; // Pass
  }

  const col = letters.indexOf(gnugoMove.coord[0]);
  const row = letters.indexOf(gnugoMove.coord[1]);
  if (col < 0 || row < 0 || col >= size || row >= size) return null;

  return [row, col];
}

// Initialize GnuGo WASM module
function initGnuGo() {
  if (gnugoReady) return Promise.resolve();

  return new Promise((resolve, reject) => {
    setStatus('⏳ 載入 GnuGo AI 引擎...');
    const Module = {};

    Module.locateFile = function(path) {
      if (path === 'gnugo.wasm') return 'gnugo.wasm';
      return path;
    };

    fetch('gnugo.wasm')
      .then(response => response.arrayBuffer())
      .then(bytes => {
        Module.wasmBinary = new Uint8Array(bytes);
        GnuGoLoader.init(Module);
        gnugoModule = Module;
        gnugoReady = true;
        console.log('GnuGo WASM loaded');
        setStatus('GnuGo AI 引擎載入完成！');
        resolve();
      })
      .catch(err => {
        console.error('Failed to load GnuGo WASM:', err);
        setStatus('⚠️ AI 引擎載入失敗，請確認 gnugo.wasm 檔案存在');
        reject(err);
      });
  });
}

  // Read settings
  size = parseInt(document.getElementById('boardSize').value);
  gameMode = document.getElementById('gameMode').value;
  playerColor = parseInt(document.getElementById('playerColor').value);
  aiLevel = parseInt(document.getElementById('aiStrength').value);
  timerEnabled = document.getElementById('timerToggle').checked;

  // Reset state
  board = createBoard(size);
  currentPlayer = BLACK;
  captures = { [BLACK]: 0, [WHITE]: 0 };
  moveHistory = [];
  boardHistory = [];
  koPoint = null;
  passCount = 0;
  gameOver = false;
  lastMove = null;
  isReviewing = false;
  isScoring = false;
  deadStones.clear();
  isAIThinking = false;

  // UI reset
  document.getElementById('scoringPanel').style.display = 'none';
  document.getElementById('reviewBar').style.display = 'none';
  document.getElementById('reviewBtn').style.display = 'none';
  document.getElementById('exitReviewBtn').style.display = 'none';
  document.getElementById('resultModal').classList.remove('show');

  // Timer
  stopTimer();
  if (timerEnabled) {
    initTimer();
    startTimer();
  }

  updateUI();
  drawBoard();
  setStatus('遊戲開始！');
  clearSave();
  saveGame();

  // If PvC mode, preload GnuGo and start if AI plays black
  if (gameMode === 'pvc') {
    initGnuGo().then(() => {
      if (playerColor === WHITE && !gameOver) {
        setTimeout(() => requestAIMove(), 300);
      }
    });
  }
}

// ==================== EVENT HANDLERS ====================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const x = Math.round((my - padding) / cellSize);
  const y = Math.round((mx - padding) / cellSize);

  if (inBounds(x, y)) {
    hoverPos = [x, y];
  } else {
    hoverPos = null;
  }
  drawBoard();
});

canvas.addEventListener('mouseleave', () => {
  hoverPos = null;
  drawBoard();
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const x = Math.round((my - padding) / cellSize);
  const y = Math.round((mx - padding) / cellSize);

  if (!inBounds(x, y)) return;

  if (isScoring) {
    // Toggle dead stones
    if (board[x][y] !== EMPTY) {
      const group = getGroup(board, x, y);
      const key0 = group.stones[0][0] * size + group.stones[0][1];
      const allDead = deadStones.has(key0);
      for (const [sx, sy] of group.stones) {
        const k = sx * size + sy;
        if (allDead) deadStones.delete(k);
        else deadStones.add(k);
      }
      updateScoringDisplay();
      drawBoard();
    }
    return;
  }

  placeStone(x, y);
});

// Settings visibility toggles
document.getElementById('gameMode').addEventListener('change', (e) => {
  const isPvC = e.target.value === 'pvc';
  document.getElementById('playerColorGroup').style.display = isPvC ? 'block' : 'none';
  document.getElementById('aiStrengthGroup').style.display = isPvC ? 'block' : 'none';
});

document.getElementById('timerToggle').addEventListener('change', (e) => {
  const show = e.target.checked;
  document.getElementById('timerSettings').style.display = show ? 'block' : 'none';
  document.getElementById('timerArea').style.display = show ? 'block' : 'none';
});

// Keyboard shortcuts for review
document.addEventListener('keydown', (e) => {
  if (!isReviewing) return;
  if (e.key === 'ArrowLeft') reviewGo(currentReviewMove - 1);
  else if (e.key === 'ArrowRight') reviewGo(currentReviewMove + 1);
  else if (e.key === 'Home') reviewGo(0);
  else if (e.key === 'End') reviewGo(moveHistory.length);
});

// Resize
window.addEventListener('resize', drawBoard);

// ==================== SAVE / RESTORE ====================
const SAVE_KEY = 'gogame_state';

function saveGame() {
  if (isReviewing || isScoring) return;
  const state = {
    size, board: board.map(r => [...r]), currentPlayer,
    captures: { 1: captures[BLACK], 2: captures[WHITE] },
    moveHistory, koPoint, passCount, gameOver, lastMove,
    gameMode, playerColor, aiLevel, timerEnabled,
    timerSeconds: { 1: timerSeconds[BLACK], 2: timerSeconds[WHITE] },
    boardHistory: boardHistory.map(s => ({
      board: s.board.map(r => [...r]),
      captures: { 1: s.captures[BLACK], 2: s.captures[WHITE] },
      koPoint: s.koPoint, currentPlayer: s.currentPlayer,
      lastMove: s.lastMove, passCount: s.passCount
    }))
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (!s || !s.board) return false;

    size = s.size;
    board = s.board.map(r => [...r]);
    currentPlayer = s.currentPlayer;
    captures = { [BLACK]: s.captures['1'], [WHITE]: s.captures['2'] };
    moveHistory = s.moveHistory || [];
    koPoint = s.koPoint;
    passCount = s.passCount || 0;
    gameOver = s.gameOver || false;
    lastMove = s.lastMove;
    gameMode = s.gameMode || 'pvp';
    playerColor = s.playerColor || BLACK;
    aiLevel = s.aiLevel || 10;
    timerEnabled = s.timerEnabled || false;
    timerSeconds = { [BLACK]: s.timerSeconds['1'], [WHITE]: s.timerSeconds['2'] };
    boardHistory = (s.boardHistory || []).map(h => ({
      board: h.board.map(r => [...r]),
      captures: { [BLACK]: h.captures['1'], [WHITE]: h.captures['2'] },
      koPoint: h.koPoint, currentPlayer: h.currentPlayer,
      lastMove: h.lastMove, passCount: h.passCount
    }));

    // Sync UI controls
    document.getElementById('boardSize').value = size;
    document.getElementById('gameMode').value = gameMode;
    document.getElementById('playerColor').value = playerColor;
    document.getElementById('aiStrength').value = aiLevel;
    document.getElementById('timerToggle').checked = timerEnabled;
    document.getElementById('playerColorGroup').style.display = gameMode === 'pvc' ? 'block' : 'none';
    document.getElementById('aiStrengthGroup').style.display = gameMode === 'pvc' ? 'block' : 'none';
    document.getElementById('timerSettings').style.display = timerEnabled ? 'block' : 'none';
    document.getElementById('timerArea').style.display = timerEnabled ? 'block' : 'none';
    if (timerEnabled) updateTimerDisplay();
    if (gameOver && document.getElementById('reviewToggle').checked) {
      document.getElementById('reviewBtn').style.display = 'block';
    }

    isReviewing = false;
    isScoring = false;
    isAIThinking = false;
    deadStones.clear();

    updateUI();
    drawBoard();
    setStatus(gameOver ? '遊戲已結束' : `已恢復棋局（第 ${moveHistory.length} 手）`);

    // Preload GnuGo if needed
    if (gameMode === 'pvc' && !gameOver) {
      initGnuGo().then(() => {
        if (currentPlayer !== playerColor) {
          setTimeout(() => requestAIMove(), 300);
        }
      });
    }
    return true;
  } catch(e) {
    console.error('Failed to load game:', e);
    return false;
  }
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

// Auto-save after each move
const origPlaceStone = placeStone;
placeStone = function(x, y) {
  const result = origPlaceStone(x, y);
  if (result) saveGame();
  return result;
};

const origDoPass = doPass;
doPass = function() {
  origDoPass();
  saveGame();
};

const origDoUndo = doUndo;
doUndo = function() {
  origDoUndo();
  saveGame();
};

// ==================== INIT ====================
if (!loadGame()) {
  startNewGame();
}
</script>
